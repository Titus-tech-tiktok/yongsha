<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>淘宝发布辅助</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <h1>淘宝发布辅助</h1>
      <label>本地 API 地址<input id="baseUrl" placeholder="http://127.0.0.1:8790"></label>
      <label>插件连接令牌<textarea id="token" rows="4" placeholder="从 Web 端复制"></textarea></label>
      <label class="inline"><input id="enabled" type="checkbox">启用自动领取</label>
      <label>轮询间隔秒<input id="pollSeconds" type="number" min="5" max="120" step="1"></label>
      <div class="actions">
        <button id="saveButton">保存</button>
        <button id="pollButton" class="secondary">立即领取</button>
      </div>
      <p id="status">读取中...</p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
