name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Branch, tag, or commit SHA to deploy"
        required: false
        default: "main"

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  check:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and test
        run: npm run check

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: check
    environment: production
    steps:
      - name: Resolve deploy ref
        id: ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.deploy_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Load SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.DEPLOY_SSH_PORT || 22 }}" "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Update server
        shell: bash
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.DEPLOY_SSH_PORT || 22 }}" "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" \
            "DEPLOY_REF='${{ steps.ref.outputs.value }}' bash -s" << 'EOF'
            set -euo pipefail
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin --prune
            if git rev-parse --verify --quiet "origin/${DEPLOY_REF}" >/dev/null; then
              git checkout --force -B "${DEPLOY_REF}" "origin/${DEPLOY_REF}"
            else
              git checkout --force "${DEPLOY_REF}"
            fi
            docker compose up -d --build
            docker image prune -f
            docker compose ps
          EOF
